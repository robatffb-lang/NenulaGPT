<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nenula AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Upgraded to Premium Sizing Display Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
    <div class="logo">
        <img src="logo1.jpg" alt="NenulaGPT Logo" class="logo-img">
        <span>NenulaGPT</span>
    </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <i data-lucide="plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="chat-history">
                
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">G</div>
                    <div class="user-info">
                        <span class="username">Guest</span>
                        <span class="status">Online</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="chat-area">
            <header class="chat-header">
                <button class="menu-btn" id="menuBtn"><i data-lucide="menu"></i></button>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon"><i data-lucide="bot"></i></div>
                    <h1>What are we doing today?</h1>
                    <p>Type anything! Ask anything!</p>
                </div>
            </div>

            <footer class="input-container">
                <form class="input-form" id="chatForm">
                    <div class="input-wrapper">
                        <textarea id="userInput" placeholder="Type anything! Ask anything!" rows="1"></textarea>
                        <button type="submit" class="send-btn" id="sendBtn" disabled>
                            <i data-lucide="arrow-up"></i>
                        </button>
                    </div>
                </form>
                <div class="footer-note">This is an AI tool, its response may not be fully correct.</div>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
